<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>குறிப்புகள் · Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&family=Lora:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1a1208;
      --ink-faint: #6b5c3e;
      --paper: #f7f2e8;
      --paper-dark: #ede5d0;
      --paper-darker: #d9cdb0;
      --accent: #c2410c;
      --accent-soft: #fed7aa;
      --rule: #c8b99a;
      --shadow: rgba(26,18,8,0.12);
      --yellow: #fef3c7;
      --green: #d1fae5;
      --blue: #dbeafe;
      --pink: #fce7f3;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      background-image:
        repeating-linear-gradient(
          transparent,
          transparent 27px,
          var(--rule) 27px,
          var(--rule) 28px
        );
      font-family: 'Lora', serif;
      color: var(--ink);
      min-height: 100vh;
    }

    /* Header */
    header {
      background: var(--ink);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px var(--shadow);
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--paper);
      letter-spacing: -0.02em;
    }

    header span {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--paper-darker);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    #search {
      background: transparent;
      border: 1px solid var(--paper-darker);
      border-radius: 0;
      padding: 0.4rem 0.8rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--paper);
      width: 180px;
      outline: none;
      transition: border-color 0.2s;
    }

    #search::placeholder { color: var(--paper-darker); }
    #search:focus { border-color: var(--paper); }

    /* New Note Button */
    #new-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.5rem 1.2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    #new-btn:hover { background: #9a3412; transform: translateY(-1px); }

    /* Main layout */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Stats bar */
    .stats {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--ink-faint);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--ink);
    }

    /* Notes Grid */
    #notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    /* Note Card */
    .note-card {
      background: var(--paper-dark);
      border: 1px solid var(--paper-darker);
      padding: 1.5rem;
      position: relative;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 3px 3px 0 var(--paper-darker);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .note-card:hover {
      transform: translate(-3px, -3px);
      box-shadow: 6px 6px 0 var(--ink);
    }

    .note-card .color-strip {
      position: absolute;
      top: 0; left: 0;
      width: 4px;
      height: 100%;
    }

    .note-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
      line-height: 1.3;
      padding-left: 0.75rem;
    }

    .note-card p {
      font-size: 0.85rem;
      color: var(--ink-faint);
      line-height: 1.6;
      padding-left: 0.75rem;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .note-meta {
      margin-top: 1rem;
      padding-left: 0.75rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--ink-faint);
      letter-spacing: 0.05em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .note-actions {
      display: flex;
      gap: 0.5rem;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .note-card:hover .note-actions { opacity: 1; }

    .note-actions button {
      background: none;
      border: 1px solid var(--paper-darker);
      padding: 0.2rem 0.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.15s;
    }
    .note-actions .edit-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .note-actions .del-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

    /* Empty state */
    #empty {
      text-align: center;
      padding: 5rem 2rem;
      display: none;
    }
    #empty .big { font-family: 'Playfair Display', serif; font-size: 3rem; opacity: 0.15; }
    #empty p { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--ink-faint); margin-top: 1rem; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,18,8,0.6);
      z-index: 200;
      backdrop-filter: blur(2px);
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--paper);
      width: min(640px, 95vw);
      max-height: 90vh;
      overflow-y: auto;
      padding: 2.5rem;
      position: relative;
      box-shadow: 10px 10px 0 var(--ink);
      border: 1px solid var(--paper-darker);
      animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.9) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--ink);
    }

    .form-group { margin-bottom: 1.25rem; }

    .form-group label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 0.4rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      background: var(--paper-dark);
      border: 1px solid var(--paper-darker);
      border-bottom: 2px solid var(--ink);
      padding: 0.75rem;
      font-family: 'Lora', serif;
      font-size: 1rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
      background: var(--paper);
    }

    /* Color picker */
    .color-picker {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .color-option {
      width: 28px; height: 28px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      border-radius: 50%;
    }
    .color-option:hover, .color-option.selected {
      border-color: var(--ink);
      transform: scale(1.2);
    }

    .modal-footer {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--paper-darker);
    }

    .btn-primary {
      background: var(--ink);
      color: var(--paper);
      border: none;
      padding: 0.7rem 1.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary:hover { background: var(--accent); }

    .btn-secondary {
      background: none;
      color: var(--ink);
      border: 1px solid var(--paper-darker);
      padding: 0.7rem 1.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: var(--ink); }

    .close-btn {
      position: absolute;
      top: 1rem; right: 1rem;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--ink-faint);
      line-height: 1;
      transition: color 0.2s;
    }
    .close-btn:hover { color: var(--accent); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 2rem; right: 2rem;
      background: var(--ink);
      color: var(--paper);
      padding: 0.75rem 1.25rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>

<header>
  <h1>குறிப்புகள்</h1>
  <span>Notes — v1.0</span>
  <div class="header-right">
    <input type="text" id="search" placeholder="தேடு / search..." />
    <button id="new-btn">+ புதிய குறிப்பு</button>
  </div>
</header>

<main>
  <div class="stats" id="stats">Loading...</div>
  <div id="notes-grid"></div>
  <div id="empty">
    <div class="big">✍️</div>
    <p>இன்னும் குறிப்புகள் இல்லை.<br>மேலே உள்ள பொத்தானை அழுத்தி தொடங்குங்கள்.</p>
  </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="close-btn" id="close-modal">×</button>
    <h2 id="modal-title">புதிய குறிப்பு</h2>
    <div class="form-group">
      <label>தலைப்பு / Title</label>
      <input type="text" id="note-title" placeholder="குறிப்பின் தலைப்பு..." />
    </div>
    <div class="form-group">
      <label>உள்ளடக்கம் / Content</label>
      <textarea id="note-content" rows="8" placeholder="உங்கள் குறிப்பை இங்கே எழுதுங்கள்..."></textarea>
    </div>
    <div class="form-group">
      <label>நிறம் / Color</label>
      <div class="color-picker" id="color-picker">
        <div class="color-option selected" data-color="#f5f0e8" style="background:#f5f0e8;"></div>
        <div class="color-option" data-color="#fef3c7" style="background:#fef3c7;"></div>
        <div class="color-option" data-color="#d1fae5" style="background:#d1fae5;"></div>
        <div class="color-option" data-color="#dbeafe" style="background:#dbeafe;"></div>
        <div class="color-option" data-color="#fce7f3" style="background:#fce7f3;"></div>
        <div class="color-option" data-color="#ffe4e6" style="background:#ffe4e6;"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="cancel-btn">ரத்து</button>
      <button class="btn-primary" id="save-btn">சேமி →</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const API = 'http://localhost:3000/api/notes';
  let notes = [];
  let editingId = null;
  let selectedColor = '#f5f0e8';

  const grid = document.getElementById('notes-grid');
  const empty = document.getElementById('empty');
  const stats = document.getElementById('stats');
  const modal = document.getElementById('modal');
  const search = document.getElementById('search');

  const COLORS = {
    '#f5f0e8': '#8b7355',
    '#fef3c7': '#d97706',
    '#d1fae5': '#059669',
    '#dbeafe': '#3b82f6',
    '#fce7f3': '#ec4899',
    '#ffe4e6': '#e11d48',
  };

  async function fetchNotes() {
    try {
      const res = await fetch(API);
      notes = await res.json();
      renderNotes(notes);
    } catch {
      showToast('⚠ Server-உடன் இணைக்க முடியவில்லை');
    }
  }

  function renderNotes(list) {
    grid.innerHTML = '';
    if (list.length === 0) {
      empty.style.display = 'block';
      stats.textContent = 'குறிப்புகள் இல்லை';
      return;
    }
    empty.style.display = 'none';
    stats.textContent = `${list.length} குறிப்பு${list.length > 1 ? 'கள்' : ''} · ${new Date().toLocaleDateString('ta-IN')}`;

    list.forEach(note => {
      const card = document.createElement('div');
      card.className = 'note-card';
      const accentColor = COLORS[note.color] || '#8b7355';
      const date = new Date(note.updatedAt).toLocaleDateString('ta-IN', { day: 'numeric', month: 'short' });

      card.innerHTML = `
        <div class="color-strip" style="background:${accentColor}"></div>
        <h3>${escHtml(note.title)}</h3>
        <p>${escHtml(note.content)}</p>
        <div class="note-meta">
          <span>${date}</span>
          <div class="note-actions">
            <button class="edit-btn" onclick="openEdit('${note.id}')">திருத்து</button>
            <button class="del-btn" onclick="deleteNote('${note.id}')">நீக்கு</button>
          </div>
        </div>
      `;
      card.style.background = note.color;
      grid.appendChild(card);
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Modal open/close
  document.getElementById('new-btn').onclick = () => openModal();
  document.getElementById('close-modal').onclick = closeModal;
  document.getElementById('cancel-btn').onclick = closeModal;
  modal.onclick = e => { if (e.target === modal) closeModal(); };

  function openModal(id = null) {
    editingId = id;
    document.getElementById('modal-title').textContent = id ? 'குறிப்பை திருத்து' : 'புதிய குறிப்பு';
    if (id) {
      const note = notes.find(n => n.id === id);
      document.getElementById('note-title').value = note.title;
      document.getElementById('note-content').value = note.content;
      selectColor(note.color);
    } else {
      document.getElementById('note-title').value = '';
      document.getElementById('note-content').value = '';
      selectColor('#f5f0e8');
    }
    modal.classList.add('open');
    document.getElementById('note-title').focus();
  }

  function openEdit(id) { openModal(id); }
  function closeModal() { modal.classList.remove('open'); editingId = null; }

  // Color picker
  document.querySelectorAll('.color-option').forEach(opt => {
    opt.onclick = () => selectColor(opt.dataset.color);
  });

  function selectColor(color) {
    selectedColor = color;
    document.querySelectorAll('.color-option').forEach(opt => {
      opt.classList.toggle('selected', opt.dataset.color === color);
    });
  }

  // Save
  document.getElementById('save-btn').onclick = async () => {
    const title = document.getElementById('note-title').value.trim();
    const content = document.getElementById('note-content').value.trim();
    if (!title || !content) { showToast('தலைப்பும் உள்ளடக்கமும் அவசியம்!'); return; }

    const body = { title, content, color: selectedColor };
    try {
      if (editingId) {
        await fetch(`${API}/${editingId}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
        showToast('✓ குறிப்பு திருத்தப்பட்டது');
      } else {
        await fetch(API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
        showToast('✓ புதிய குறிப்பு சேர்க்கப்பட்டது');
      }
      closeModal();
      fetchNotes();
    } catch { showToast('⚠ சேமிக்க முடியவில்லை'); }
  };

  // Delete
  async function deleteNote(id) {
    if (!confirm('இந்த குறிப்பை நீக்கவா?')) return;
    await fetch(`${API}/${id}`, { method: 'DELETE' });
    showToast('✓ குறிப்பு நீக்கப்பட்டது');
    fetchNotes();
  }

  // Search
  search.oninput = () => {
    const q = search.value.toLowerCase();
    renderNotes(notes.filter(n => n.title.toLowerCase().includes(q) || n.content.toLowerCase().includes(q)));
  };

  // Toast
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Keyboard shortcut
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); openModal(); }
  });

  fetchNotes();
</script>
</body>
</html>
